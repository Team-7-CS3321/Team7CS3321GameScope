name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Ruff
        working-directory: backend
        run: uvx ruff check .

  coverage:
    name: Backend Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run tests with coverage
        working-directory: backend
        env:
          PYTHONPATH: src
        run: |
          mkdir -p coverage
          uv run coverage run --source=src/team7cs3321gamescope -m pytest
          uv run coverage lcov -o coverage/lcov.info
          uv run coverage report

      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: backend/coverage/lcov.info
          min_coverage: 80
          exclude: '**/**/__init__.py tests/**'

  frontend-coverage:
    name: Frontend Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run coverage

      - name: Check frontend coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: frontend/coverage/lcov.info
          min_coverage: 80

  build:
    name: Build & Push
    needs: [coverage, frontend-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          password: ${{ steps.doppler.outputs.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build --no-cache -t ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-backend:latest ./backend

      - name: Push backend image
        run: docker push ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-backend:latest

      - name: Build frontend image
        run: |
          docker build --no-cache \
            --build-arg VITE_API_URL=http://${{ steps.doppler.outputs.EC2_HOST }}:8000 \
            -t ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-frontend:latest \
            ./frontend

      - name: Push frontend image
        run: docker push ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-frontend:latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        with:
          host: ${{ steps.doppler.outputs.EC2_HOST }}
          username: ${{ steps.doppler.outputs.EC2_USER }}
          key: ${{ steps.doppler.outputs.EC2_PEM }}
          envs: DOPPLER_TOKEN
          script: |
            sudo docker rm -f gamescope gamescope-backend gamescope-frontend || true
            sudo docker pull ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-backend:latest
            sudo docker pull ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-frontend:latest
            sudo docker run -d --name gamescope-backend -p 8000:8000 \
              -e DOPPLER_TOKEN="$DOPPLER_TOKEN" \
              ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-backend:latest
            sudo docker run -d --name gamescope-frontend -p 80:80 \
              ${{ steps.doppler.outputs.DOCKER_USERNAME }}/gamescope-frontend:latest
