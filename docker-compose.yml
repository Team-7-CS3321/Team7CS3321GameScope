services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamescope-backend
    ports:
      - "8000:8000"
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamescope-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
